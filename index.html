<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Drill — To'liq Test Mashinasi</title>
<style>
  :root{
    --ink:#1b1d22;
    --paper:#f7f4ec;
    --rule:#d8d2c2;
    --chalk:#2f5d50;
    --chalk-dim:#7fa89c;
    --red:#a8412e;
    --gold:#c79a3c;
    --card:#fffdf8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Georgia','Iowan Old Style',serif;
    min-height:100vh;
  }
  .chalkfont{font-family:'Courier New',monospace;}

  header{
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 40%),
      linear-gradient(180deg,#234138,#1b332b);
    color:#eef3ef;
    padding:40px 24px 56px;
    position:relative;
    border-bottom:10px solid #5b4226;
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Courier New',monospace;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold);
    margin:0 0 10px;
  }
  h1{
    margin:0;
    font-size:clamp(26px,5vw,42px);
    font-weight:400;
    line-height:1.15;
    max-width:680px;
    text-shadow:0 1px 0 rgba(0,0,0,.3);
  }
  h1 .accent{color:var(--gold); font-style:italic;}
  .sub{
    max-width:580px;
    margin:14px 0 0;
    font-size:15px;
    color:#cdd9d2;
    line-height:1.6;
  }

  .wrap{max-width:760px; margin:-30px auto 60px; padding:0 20px;}

  .meta-row{
    display:flex; gap:14px; align-items:center;
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:4px;
    padding:14px 18px;
    box-shadow:0 8px 22px -14px rgba(0,0,0,.35);
    font-family:'Courier New',monospace;
    font-size:13px; color:#555;
    margin-bottom:14px;
    flex-wrap:wrap;
    position:sticky; top:10px; z-index:5;
  }
  .meta-row b{color:var(--ink);}
  .track{flex:1; min-width:120px; height:6px; background:var(--rule); border-radius:3px; overflow:hidden;}
  .track-fill{height:100%; background:linear-gradient(90deg,var(--chalk),var(--gold)); width:0%; transition:width .35s ease;}
  .restart-btn{
    border:1px solid var(--ink); background:transparent; color:var(--ink);
    font-family:'Courier New',monospace; font-size:12px; padding:6px 12px;
    border-radius:3px; cursor:pointer; letter-spacing:.04em;
  }
  .restart-btn:hover{background:var(--ink); color:var(--paper);}

  /* jump nav */
  .jumpnav{
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:30px;
  }
  .jumpnav a{
    font-family:'Courier New',monospace;
    font-size:11px;
    text-decoration:none;
    color:var(--chalk);
    border:1px solid var(--chalk-dim);
    padding:4px 9px;
    border-radius:12px;
    background:#fff;
  }
  .jumpnav a:hover{background:var(--chalk); color:#fff;}

  .category{margin:34px 0 14px; display:flex; align-items:baseline; gap:12px; scroll-margin-top:70px;}
  .category .num{
    font-family:'Courier New',monospace; font-size:13px; color:var(--gold);
    background:var(--ink); padding:2px 8px; border-radius:2px;
  }
  .category h2{font-size:18px; margin:0; font-weight:600; color:var(--chalk);}
  .category .line{
    flex:1; height:1px;
    background:repeating-linear-gradient(90deg,var(--rule) 0,var(--rule) 6px,transparent 6px,transparent 11px);
  }

  .qcard{
    background:var(--card); border:1px solid var(--rule); border-radius:6px;
    padding:20px 22px; margin-bottom:14px;
    box-shadow:0 10px 26px -20px rgba(0,0,0,.4);
  }
  .qtext{font-size:17px; line-height:1.55; margin:0 0 14px;}
  .options{display:grid; gap:9px;}
  .opt{
    text-align:left; width:100%; border:1.5px solid var(--rule);
    background:#fff; padding:10px 14px; border-radius:5px;
    font-family:'Georgia',serif; font-size:15px; cursor:pointer;
    color:var(--ink); transition:.12s ease; position:relative;
  }
  .opt:hover:not(:disabled){border-color:var(--chalk); background:#f2f7f4;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--chalk); background:#e7f1ec; color:var(--chalk); font-weight:600;}
  .opt.correct::after{
    content:"✓ to'g'ri"; position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-family:'Courier New',monospace; font-size:11px; color:var(--chalk);
  }
  .opt.wrong{border-color:var(--red); background:#fbeae6; color:var(--red); text-decoration:line-through;}
  .opt.wrong::after{
    content:"✕ xato"; position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-family:'Courier New',monospace; font-size:11px; color:var(--red); text-decoration:none;
  }
  .opt.dim{opacity:.45;}

  .note{
    margin:12px 0 0; font-size:13px; color:#6b6457;
    font-family:'Courier New',monospace; border-left:3px solid var(--gold);
    padding-left:10px; display:none;
  }
  .note.show{display:block;}

  .result{
    background:linear-gradient(180deg,#234138,#1b332b); color:#eef3ef;
    border-radius:8px; padding:32px 26px; text-align:center; margin-top:30px; display:none;
  }
  .result.show{display:block;}
  .result .big{font-size:48px; color:var(--gold); font-family:'Courier New',monospace; margin:0;}
  .result p{margin:6px 0 18px; color:#cdd9d2;}
  .result button{
    border:1px solid var(--gold); background:transparent; color:var(--gold);
    padding:10px 22px; border-radius:4px; font-family:'Courier New',monospace;
    cursor:pointer; font-size:13px; letter-spacing:.05em;
  }
  .result button:hover{background:var(--gold); color:#1b332b;}

  footer{text-align:center; font-size:12px; color:#9a9486; font-family:'Courier New',monospace; padding:10px 0 40px;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>

<header>
  <p class="eyebrow chalkfont">B1–B2 · Full Grammar Drill</p>
  <h1>Qoidani <span class="accent">eslab qol</span>,<br>keyin gapni <span class="accent">to'g'rila</span>.</h1>
  <p class="sub">8 mavzu, 75+ savol. Har bir tugmani bossangiz — javob darhol ko'rinadi, izoh bilan. Yuqoridagi mavzu tugmalaridan kerakli bo'limga sakrab o'tishingiz mumkin.</p>
</header>

<div class="wrap">

  <div class="meta-row">
    <span>Savol: <b id="answeredCount">0</b>/<span id="totalCount">75</span></span>
    <div class="track"><div class="track-fill" id="trackFill"></div></div>
    <span>Ball: <b id="scoreCount">0</b></span>
    <button class="restart-btn" id="restartBtn">Qayta boshlash</button>
  </div>

  <div class="jumpnav" id="jumpNav"></div>

  <div id="quizRoot"></div>

  <div class="result" id="resultPanel">
    <p class="big chalkfont" id="resultScore">0/75</p>
    <p id="resultMsg">Natija shu.</p>
    <button id="retryBtn">Yana urinib ko'rish</button>
  </div>

</div>

<footer>tap → check → eslab qol</footer>

<script>
const DATA = [
  { cat: "Present / Past / Future Simple", items: [
    { q: "Which sentence is in Present Simple?", options: ["She works as a teacher in a local school.", "She is working as a teacher right now.", "She has worked as a teacher.", "She worked as a teacher."], correct: 0, note: "Present Simple — doimiy haqiqat yoki odat: 'Water boils at 100°C' kabi." },
    { q: "Which sentence shows Present Continuous?", options: ["They are playing football in the backyard right now.", "They play football every weekend.", "They have played football before.", "They played football yesterday."], correct: 0, note: "Present Continuous: 'am/is/are + V-ing' — hozir davom etayotgan harakat." },
    { q: "Which word is a signal word for Present Simple?", options: ["Usually", "Right now", "At the moment", "Currently"], correct: 0, note: "'Usually, always, often, everyday, seldom' — odatiy harakatlarni bildiruvchi belgi so'zlar." },
    { q: "Which sentence is correct for Present Perfect?", options: ["I have already finished my homework.", "I already finished my homework.", "I am already finishing my homework.", "I already finish my homework."], correct: 0, note: "Present Perfect: 'have/has + V3' — yaqinda tugagan, natijasi hozirgacha muhim harakat." },
    { q: "I ___ to school every day.", options: ["go", "going", "went", "am go"], correct: 0, note: "Odatiy harakat — Present Simple: subject + V1 (base form)." },
    { q: "She ___ TV yesterday.", options: ["watched", "watch", "watches", "is watching"], correct: 0, note: "'yesterday' — Past Simple belgisi, fe'l V2 shaklida." },
    { q: "I ___ not go to school yesterday.", options: ["did", "do", "was", "have"], correct: 0, note: "Past Simple inkor: 'did not (didn't) + V1'." },
    { q: "She ___ reading a book now.", options: ["is", "are", "was", "has"], correct: 0, note: "'now' — Present Continuous belgisi: 'is + V-ing'." },
    { q: "Choose the correct structure of Present Perfect.", options: ["Subject + have/has + Past Participle (V3)", "Subject + had + V3", "Subject + will + V1", "Subject + am/is/are + V-ing"], correct: 0, note: "Present Perfect tuzilishi: have/has + V3." },
    { q: "Choose the correct sentence.", options: ["We have just eaten lunch.", "We just eaten lunch.", "We have just eat lunch.", "We just have eaten lunch."], correct: 0, note: "'just' Present Perfect ichida have/has dan keyin keladi." },
    { q: "\"I finished my homework.\" — bu qaysi tuzilma?", options: ["Past Simple (tugagan o'tmish harakati)", "Present Perfect", "Past Continuous", "Future Simple"], correct: 0, note: "Aniq tugagan o'tmish harakati — Past Simple." },
    { q: "\"She visited her grandmother.\" — bu qaysi tuzilma?", options: ["Past Simple (qoidali fe'l, -ed qo'shimchasi)", "Present Simple", "Past Perfect", "Present Continuous"], correct: 0, note: "Qoidali fe'lga -ed qo'shilishi — Past Simple belgisi." },
    { q: "\"We just eaten lunch.\" — bu gap to'g'rimi?", options: ["Noto'g'ri — 'have' yetishmaydi (We have just eaten lunch)", "To'g'ri", "Noto'g'ri — 'eaten' o'rniga 'ate' kerak", "Noto'g'ri — 'just' kerak emas"], correct: 0, note: "Present Perfect uchun yordamchi fe'l 'have/has' albatta kerak." },
    { q: "Which form is used for instant decisions?", options: ["Future Simple (will)", "Future Perfect", "Present Continuous", "Past Simple"], correct: 0, note: "Tezkor, o'sha zahoti qabul qilingan qarorlar uchun 'will' ishlatiladi." },
    { q: "Look at the sky! It ___ rain.", options: ["is going to", "will", "is", "was going to"], correct: 0, note: "Hozirgi belgilarga asoslangan bashorat — 'be going to'." },
    { q: "I ___ my friend tomorrow.", options: ["am meeting", "meet", "will met", "am meet"], correct: 0, note: "Oldindan rejalashtirilgan kelajak reja — Present Continuous (am meeting) yoki 'am going to meet'." },
    { q: "I promise I ___ you later.", options: ["will call", "am calling", "call", "called"], correct: 0, note: "Va'da berish — 'will' ishlatiladi." },
    { q: "The English lesson ___ at 9:00 AM every Monday.", options: ["starts", "is starting", "started", "will start"], correct: 0, note: "Jadval/rejalashtirilgan doimiy voqea — Present Simple." },
  ]},
  { cat: "Continuous va Perfect Continuous", items: [
    { q: "While I ___ my homework, the phone rang.", options: ["was doing", "did", "have done", "am doing"], correct: 0, note: "Uzoq davom etgan fon harakati — Past Continuous: 'was/were + V-ing'." },
    { q: "She ___ her homework yet. She needs more time.", options: ["hasn't finished", "didn't finish", "isn't finishing", "won't finish"], correct: 0, note: "'yet' — Present Perfect inkor gaplarida ishlatiladi: 'hasn't/haven't + V3'." },
    { q: "We ___ a movie at 8 p.m. tomorrow evening.", options: ["will be watching", "watch", "watched", "have watched"], correct: 0, note: "Future Continuous: kelajakda ma'lum vaqtda davom etayotgan harakat — 'will be + V-ing'." },
  ]},
  { cat: "Infinitiv, Gerund va -ing/-ed Sifatlar", items: [
    { q: "I want ___ (learn) English.", options: ["to learn", "learning", "learn", "learned"], correct: 0, note: "'want' dan keyin to-infinitiv keladi: 'want to + V1'." },
    { q: "She decided ___ (go) to the park.", options: ["to go", "going", "go", "went"], correct: 0, note: "'decide' dan keyin to-infinitiv keladi." },
    { q: "We must ___ (finish) our homework.", options: ["finish", "to finish", "finishing", "finished"], correct: 0, note: "Modal fe'l 'must' dan keyin V1 (base form) keladi, infinitiv belgisi 'to' siz." },
    { q: "It is important ___ (eat) healthy food.", options: ["to eat", "eating", "eat", "ate"], correct: 0, note: "'It is important + to-infinitive' — qoida shu tuzilmada." },
    { q: "He enjoys ___ football.", options: ["playing", "to play", "play", "played"], correct: 0, note: "'enjoy' dan keyin gerund (-ing shakl) keladi." },
    { q: "Look at that ___ dog! (-ing sifat sifatida)", options: ["barking", "barked", "bark", "barks"], correct: 0, note: "Harakatni faol bajaruvchini tasvirlash uchun -ing sifat ishlatiladi: 'barking dog'." },
    { q: "We were scared by the ___ noise. (-ing sifat sifatida)", options: ["frightening", "frightened", "fright", "frighten"], correct: 0, note: "-ing sifat — narsa/hodisaning o'zi hissi uyg'otadi (qo'rqitadigan tovush)." },
    { q: "I like ___ in the morning.", options: ["running", "to running", "run", "ran"], correct: 0, note: "'like' dan keyin gerund (-ing) ham ishlatilishi mumkin: 'like + V-ing'." },
    { q: "I want ___ English.", options: ["to learn", "learning", "learn", "learned"], correct: 0, note: "'want' dan keyin to-infinitiv: 'to learn / to study'." },
    { q: "I went to the library ___.", options: ["to study", "for study", "studying", "study"], correct: 0, note: "Maqsadni bildirish uchun to-infinitiv ishlatiladi: 'went... to study/to borrow'." },
    { q: "She enjoys ___ movies.", options: ["watching", "to watch", "watch", "watched"], correct: 0, note: "'enjoy' doim gerund (-ing) bilan keladi." },
    { q: "They finished ___ homework.", options: ["doing their", "to do their", "do their", "did their"], correct: 0, note: "'finish' dan keyin gerund keladi: 'finish doing'." },
  ]},
  { cat: "Modal Fe'llar (can, must, should, will be able to)", items: [
    { q: "He ___ be at home now.", options: ["must", "do", "did", "is"], correct: 0, note: "Mantiqiy taxmin/ishonch uchun 'must/might/should' ishlatiladi." },
    { q: "I ___ drive a car.", options: ["can", "do", "am", "will"], correct: 0, note: "Qobiliyat/ruhsatni bildirish uchun 'can/can't' ishlatiladi." },
    { q: "You ___ smoke in the classroom.", options: ["must not", "don't must", "can to not", "not must"], correct: 0, note: "Qattiq taqiq uchun 'must not / shouldn't' ishlatiladi." },
    { q: "___ I borrow your pen?", options: ["May", "Do", "Am", "Did"], correct: 0, note: "Ruhsat so'rash uchun 'May/Can/Could' ishlatiladi." },
    { q: "I ___ speak English very well.", options: ["can", "do", "am", "will be"], correct: 0, note: "Qobiliyatni bildirish — 'can'." },
    { q: "When I was young, I ___ ride a bike very fast.", options: ["could", "can", "will", "am able"], correct: 0, note: "O'tmishdagi qobiliyat — 'could' (can ning o'tgan zamoni)." },
    { q: "Next year, I ___ drive a car.", options: ["will be able to", "can", "could", "must"], correct: 0, note: "Kelajakdagi qobiliyat — 'will be able to' (can ning kelajak shakli)." },
    { q: "You ___ wear a uniform at school.", options: ["must / have to", "can", "might", "would"], correct: 0, note: "Majburiyatni bildirish — 'must / have to'." },
  ]},
  { cat: "Artikllar, Sifatlar va Miqdor So'zlari", items: [
    { q: "I go to work every day at 8 a.m.", options: ["Present Simple — doimiy odat/rejimni bildiradi", "Present Continuous", "Past Simple", "Future Simple"], correct: 0, note: "Har kungi takrorlanuvchi harakat — Present Simple." },
    { q: "I ___ swim very well.", options: ["can", "do", "am", "will"], correct: 0, note: "Qobiliyat — 'can'." },
    { q: "I saw ___ apple on the table.", options: ["an", "a", "the", "—"], correct: 0, note: "Unli tovush bilan boshlanadigan so'zdan oldin 'an' ishlatiladi." },
    { q: "He drives very ___.", options: ["carefully", "careful", "care", "carefuller"], correct: 0, note: "Fe'lni ('drives') tasvirlash uchun ravish (adverb) kerak: 'carefully'." },
    { q: "Which sentence has a subject complement?", options: ["She is a talented doctor.", "She drives a car.", "She bought a book.", "She called him."], correct: 0, note: "'be' fe'lidan keyin egani tasvirlovchi qism — subject complement: 'a talented doctor'." },
    { q: "The ___ girl won the prize. (sifat)", options: ["smart", "smartly", "smarting", "smarter than"], correct: 0, note: "Otdan oldin sifat (adjective) keladi: 'smart girl'." },
    { q: "I need ___ advice.", options: ["some", "a", "an", "many"], correct: 0, note: "'advice' — sanalmaydigan ot, shuning uchun 'some' ishlatiladi." },
    { q: "He has ___ friends in this city.", options: ["a few", "a little", "much", "a piece of"], correct: 0, note: "Sanaladigan ko'plik otlar bilan 'a few' ishlatiladi (oz miqdor)." },
    { q: "There is ___ milk in the fridge.", options: ["some", "a few", "many", "these"], correct: 0, note: "Sanalmaydigan ot bilan ijobiy gapda 'some' ishlatiladi." },
    { q: "___ the window, please.", options: ["Open", "Opening", "Opened", "To open"], correct: 0, note: "Buyruq gap (imperative) — fe'l V1 shaklida, ega tushiriladi." },
  ]},
  { cat: "Bog'lovchilar va Murakkab Gaplar", items: [
    { q: "___ he worked hard, he failed.", options: ["Although", "Despite", "Because", "So"], correct: 0, note: "Qarama-qarshilikni bildirish uchun ergash gap bog'lovchisi 'Although' ishlatiladi." },
    { q: "Which sentence is correct?", options: ["Both students passed the exam.", "Both students passes the exam.", "Both student passed the exam.", "Both of student passed the exam."], correct: 0, note: "'Both + ko'plik ot + ko'plik fe'l' qoidasi." },
    { q: "Both students ___ passed the exam.", options: ["have", "has", "had has", "is"], correct: 0, note: "'Both' — ko'plik mavzu, shuning uchun 'have' ishlatiladi." },
    { q: "Either you or he ___ wrong.", options: ["is", "are", "am", "be"], correct: 0, note: "'Either...or' qoidasi: fe'l eng yaqin egaga ('he') mos keladi — 'is'." },
    { q: "She ___ born in 1995.", options: ["was", "is", "has", "did"], correct: 0, note: "Passiv, o'tgan zamon: 'was born' — tug'ilish voqeasi uchun standart ibora." },
    { q: "The children ___ playing in the park.", options: ["were", "was", "is", "has"], correct: 0, note: "'children' ko'plik, Past Continuous bilan 'were' ishlatiladi." },
    { q: "Which sentence uses 'despite' correctly?", options: ["Despite the rain, they went out.", "Despite it rained, they went out.", "Despite of the rain, they went out.", "Despite because it rained, they went out."], correct: 0, note: "'Despite' dan keyin ot yoki gerund keladi, ergash gap emas." },
    { q: "___ her hard work, she failed.", options: ["Despite", "Although", "Because", "So that"], correct: 0, note: "'Despite / In spite of' dan keyin ot/gerund birikmasi keladi." },
    { q: "He is ___ tired to walk.", options: ["too", "so", "such", "very"], correct: 0, note: "'too + sifat + to-infinitiv' — natijada imkonsizlikni bildiradi." },
    { q: "She is ___ a fast runner that she won easily.", options: ["such", "so", "too", "very"], correct: 0, note: "'such + a/an + sifat + ot + that' tuzilmasi natijani bildiradi." },
  ]},
  { cat: "Sifat Darajalari va Imlo", items: [
    { q: "This is ___ than I thought. (mavhum kontekst)", options: ["further", "farther", "more far", "most far"], correct: 0, note: "'further' — mavhum (abstract) ma'noda ishlatiladi; 'farther' — jismoniy masofa uchun." },
    { q: "He is the ___ person I know.", options: ["smartest", "smarter", "more smart", "most smartest"], correct: 0, note: "Bir bo'g'inli sifatlarda superlative '-est' qo'shimchasi bilan yasaladi." },
    { q: "Which is the correct spelling?", options: ["Necessary", "Neccessary", "Necesary", "Neccesary"], correct: 0, note: "To'g'ri imlo — 'Necessary' (bir 'c', ikki 's')." },
    { q: "She ___ to the doctor yesterday.", options: ["went", "go", "goes", "going"], correct: 0, note: "'yesterday' — Past Simple, 'go' fe'lining noto'g'ri shakli 'went'." },
  ]},
  { cat: "Perfect Zamonlar (Past/Future Perfect)", items: [
    { q: "By the time I arrived, he ___ already left.", options: ["had", "has", "have", "was"], correct: 0, note: "Past Perfect: ikkinchi o'tmishdan oldin sodir bo'lgan harakat uchun 'had + V3'." },
    { q: "She ___ studying English for 3 years before she moved abroad.", options: ["had been", "has been", "was", "is"], correct: 0, note: "Past Perfect Continuous: 'had been + V-ing' — davom etgan harakat, oldingi nuqtagacha." },
    { q: "Which sentence is in Future Perfect?", options: ["I will have completed the report by 5 PM tomorrow.", "I am completing the report now.", "I completed the report yesterday.", "I will complete the report."], correct: 0, note: "Future Perfect: 'will have + V3' — kelajakdagi muayyan vaqtgacha tugagan harakat." },
    { q: "I ___ the report by 5 PM tomorrow.", options: ["will have finished", "finish", "am finishing", "finished"], correct: 0, note: "'will have + V3' — kelajakda ma'lum vaqtgacha bajarilgan ish." },
    { q: "She ___ finish the test. (just)", options: ["has just finished", "just finishes", "is just finishing", "just finished"], correct: 0, note: "'just' Present Perfect bilan — yaqinda tugagan harakat: 'has/have + just + V3'." },
  ]},
  { cat: "Savol Turlari, Olmoshlar va Passiv Ovoz", items: [
    { q: "Choose the correct question form.", options: ["Does she live here?", "Does she lives here?", "She does live here?", "Live she here?"], correct: 0, note: "Hozirgi zamon savoli: 'Does + subject + V1 (base form)?'" },
    { q: "___ she finish the work? (o'tgan zamon savoli)", options: ["Did", "Does", "Will", "Has"], correct: 0, note: "Past Simple savol uchun 'Did + subject + V1?' ishlatiladi." },
    { q: "___ they coming to the party?", options: ["Are", "Do", "Did", "Have"], correct: 0, note: "Present Continuous savoli: 'Are + subject + V-ing?'" },
    { q: "\"I am not sure he will come.\" — bu gap turi qanday?", options: ["Complex sentence (ergash gapli qo'shma gap)", "Simple sentence", "Compound sentence", "Imperative sentence"], correct: 0, note: "Bosh gap + ergash gap ('he will come') — noaniqlikni ifodalaydi, shuning uchun complex sentence." },
    { q: "She doesn't know ___ to do.", options: ["what", "that", "which is", "how that"], correct: 0, note: "'what to do' — to'liqsiz infinitiv ergash gap, savol so'zi 'what' kerak." },
    { q: "He asked ___ I had eaten.", options: ["if", "that", "what", "because"], correct: 0, note: "Bilvosita ha/yo'q savoq uchun 'if' yoki 'whether' ishlatiladi." },
    { q: "Which is a compound sentence?", options: ["He wanted to go, but it started to rain.", "He wanted to go because it started to rain.", "Although it rained, he went.", "He went, although it rained."], correct: 0, note: "Compound sentence — ikki teng gap bog'lovchi ('but') orqali bog'langan, biri ikkinchisiga bog'liq emas." },
    { q: "She is ___ than me. (elder/older)", options: ["older", "elder", "more old", "oldest"], correct: 0, note: "'older' — umumiy yosh taqqoslash uchun ishlatiladi (yoshi kattaroq)." },
    { q: "He is the ___ son. (eldest/oldest)", options: ["eldest", "oldest", "elder", "older"], correct: 0, note: "'eldest' — oila ichida tug'ilish tartibi (katta o'g'il) uchun ishlatiladi." },
    { q: "Which sentence uses 'hardly' correctly?", options: ["I could hardly hear what he was saying.", "I could hardly heard what he was saying.", "I hardly could not hear him.", "I can't hardly hear him."], correct: 0, note: "'hardly' — 'deyarli yo'q' ma'nosida, modal fe'ldan keyin V1 bilan keladi." },
    { q: "___ the movie started, we sat down.", options: ["Before", "Until", "Since", "By"], correct: 0, note: "'Before' — film boshlanishidan oldingi harakatni bog'lovchi." },
    { q: "We waited ___ the bus arrived.", options: ["until", "before", "while", "by"], correct: 0, note: "'until' — biror voqea sodir bo'lgunga qadar davom etgan kutishni bildiradi." },
    { q: "Which is the correct reflexive pronoun for 'she'?", options: ["herself", "hisself", "himself", "theirself"], correct: 0, note: "'she' uchun refleksiv olmosh — 'herself'." },
    { q: "He hurt ___ while cooking.", options: ["himself", "herself", "itself", "themself"], correct: 0, note: "Erkak egasi uchun refleksiv olmosh — 'himself'." },
    { q: "They did it ___.", options: ["themselves", "theirself", "themself", "itself"], correct: 0, note: "Ko'plik egasi uchun refleksiv olmosh — 'themselves'." },
    { q: "Choose the correct standard word order.", options: ["Subject + Verb + Object (SVO)", "Verb + Subject + Object (VSO)", "Object + Subject + Verb (OSV)", "Subject + Object + Verb (SOV)"], correct: 0, note: "Ingliz tilida standart gap tartibi — SVO (Ega + Kesim + To'ldiruvchi)." },
    { q: "He ___ late for class.", options: ["is never", "never is", "is not never", "never not is"], correct: 0, note: "'never' to'liq fe'l (be) bilan ishlatilganda fe'ldan keyin keladi: 'is never'." },
    { q: "Which sentence is passive?", options: ["The book was written by an anonymous author.", "An anonymous author wrote the book.", "The author is writing a book.", "The author has a book."], correct: 0, note: "Passiv gap: 'was + V3 + by + agent' — ta'sir ko'ruvchi ob'ekt egaga aylanadi." },
  ]},
];

let answered = 0;
let score = 0;
const total = DATA.reduce((sum, cat) => sum + cat.items.length, 0);
document.getElementById('totalCount').textContent = total;

function render(){
  const root = document.getElementById('quizRoot');
  const nav = document.getElementById('jumpNav');
  root.innerHTML = '';
  nav.innerHTML = '';
  let qIndex = 0;

  DATA.forEach((cat, ci) => {
    const catId = 'cat-' + ci;

    const navLink = document.createElement('a');
    navLink.href = '#' + catId;
    navLink.textContent = (ci+1) + '. ' + cat.cat.split('(')[0].trim();
    nav.appendChild(navLink);

    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.id = catId;
    catDiv.innerHTML = `<span class="num chalkfont">${String(ci+1).padStart(2,'0')}</span><h2>${cat.cat}</h2><div class="line"></div>`;
    root.appendChild(catDiv);

    cat.items.forEach((item) => {
      qIndex++;
      const card = document.createElement('div');
      card.className = 'qcard';
      card.id = 'q-' + qIndex;

      const qtext = document.createElement('p');
      qtext.className = 'qtext';
      qtext.textContent = qIndex + '. ' + item.q;
      card.appendChild(qtext);

      const optsDiv = document.createElement('div');
      optsDiv.className = 'options';

      item.options.forEach((optText, oi) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = optText;
        btn.addEventListener('click', () => handleAnswer(card, item, oi, optsDiv));
        optsDiv.appendChild(btn);
      });

      card.appendChild(optsDiv);

      const note = document.createElement('p');
      note.className = 'note';
      note.textContent = item.note;
      card.appendChild(note);

      root.appendChild(card);
    });
  });
}

function handleAnswer(card, item, chosenIndex, optsDiv){
  if (card.dataset.done) return;
  card.dataset.done = '1';
  answered++;
  const isCorrect = chosenIndex === item.correct;
  if (isCorrect) score++;

  Array.from(optsDiv.children).forEach((btn, i) => {
    btn.disabled = true;
    if (i === item.correct){
      btn.classList.add('correct');
    } else if (i === chosenIndex){
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
  });

  card.querySelector('.note').classList.add('show');
  updateMeta();
}

function updateMeta(){
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('scoreCount').textContent = score;
  document.getElementById('trackFill').style.width = (answered/total*100) + '%';

  if (answered === total){
    const panel = document.getElementById('resultPanel');
    panel.classList.add('show');
    document.getElementById('resultScore').textContent = score + '/' + total;
    let msg = '';
    const pct = score/total;
    if (pct === 1) msg = "Mukammal! Barcha qoidalarni mustahkam bilasiz.";
    else if (pct >= 0.8) msg = "Juda yaxshi! Faqat bir nechta qoidani takrorlang.";
    else if (pct >= 0.5) msg = "Yaxshi boshlanish — xato qilingan joylarni qaytadan o'qing.";
    else msg = "Mavzularni qaytadan ko'rib chiqish foydali bo'ladi — har bir izohni diqqat bilan o'qing.";
    document.getElementById('resultMsg').textContent = msg;
    panel.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function reset(){
  answered = 0;
  score = 0;
  document.getElementById('resultPanel').classList.remove('show');
  updateMeta();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('restartBtn').addEventListener('click', reset);
document.getElementById('retryBtn').addEventListener('click', reset);

render();
</script>
